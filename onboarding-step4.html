<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Complete</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" sizes="any">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0f2027; color: #e2e8f0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .step-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; }
    .step-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; }
    .step-dot.done { background: #059669; color: #fff; }
    .step-dot.active { background: #2563eb; color: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,0.35); }
    .step-dot.pending { background: transparent; border: 2px solid #475569; color: #94a3b8; }
    .step-line { width: 40px; height: 2px; background: #475569; }
    .step-line.done { background: #059669; }
    .card {
      width: 100%; max-width: 520px;
      background: linear-gradient(180deg, rgba(28,58,67,0.97), rgba(15,32,39,0.97));
      border: 1px solid rgba(122,183,214,0.15);
      border-radius: 18px; padding: 48px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .card .checkmark {
      width: 64px; height: 64px; border-radius: 50%;
      background: #059669; color: #fff;
      font-size: 2rem; line-height: 64px;
      margin: 0 auto 20px;
    }
    .card h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    .card p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 28px; }
    .btn-primary {
      display: inline-block; padding: 14px 32px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
      text-decoration: none; transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .spinner { margin: 20px auto; width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="step-bar" aria-label="Onboarding progress">
    <span class="step-dot done">&#10003;</span>
    <span class="step-line done"></span>
    <span class="step-dot done">&#10003;</span>
    <span class="step-line done"></span>
    <span class="step-dot done">&#10003;</span>
    <span class="step-line done"></span>
    <span class="step-dot active">4</span>
  </div>

  <div class="card">
    <div class="checkmark">&#10003;</div>
    <h1>You're all set!</h1>
    <p>
      Your company is fully onboarded. Head to the dashboard to manage
      clients, view reports, and customize your settings.
    </p>
    <a href="/main.html" class="btn-primary" style="margin-right:8px">Go to Dashboard</a>
    <div class="spinner"></div>
    <p style="color:#94a3b8;font-size:0.82rem;margin-top:8px;">Redirecting automatically...</p>
  </div>

  <script>
    setTimeout(function () {
      window.location.href = '/main.html';
    }, 3000);
  </script>
  <script src="/js/onboarding-bg.js" defer></script>
</body>
</html>
