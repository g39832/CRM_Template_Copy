<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" sizes="any">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f2027;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: linear-gradient(135deg, rgba(32,58,67,0.96), rgba(15,32,39,0.95));
      border-bottom: 1px solid rgba(122,183,214,0.18);
      border-radius: 14px;
      margin-bottom: 24px;
    }
    header h1 { font-size: 1.3rem; }
    .btn-logout {
      padding: 8px 16px;
      border: 1px solid rgba(122,183,214,0.2);
      border-radius: 8px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.06); }
    .card { 
      background: linear-gradient(180deg, rgba(28,58,67,0.97), rgba(15,32,39,0.97));
      border: 1px solid rgba(122,183,214,0.15);
      border-radius: 14px;
      padding: 24px;
    }
    .card h2 { margin-bottom: 8px; }
    .card p { color: #94a3b8; }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard</h1>
    <button class="btn-logout" id="logoutBtn">Sign Out</button>
  </header>

  <div class="card">
    <h2>Welcome!</h2>
    <p id="userInfo">Loading user info...</p>
  </div>

  <script>
    fetch('/api/v2/auth/me')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data.authenticated) {
          window.location.href = '/login-v2';
          return;
        }
        var info = document.getElementById('userInfo');
        info.textContent = 'Signed in as ' + data.user.email + ' (' + data.user.role + ')';
      });

    document.getElementById('logoutBtn').addEventListener('click', function () {
      fetch('/api/v2/auth/logout', { method: 'POST' })
        .then(function () { window.location.href = '/login-v2'; });
    });
  </script>
</body>
</html>
