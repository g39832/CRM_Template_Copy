<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding - Company Profile</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" sizes="any">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0f2027;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ---------- step indicator ---------- */
    .step-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .step-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      transition: background 0.25s, border-color 0.25s;
    }

    .step-dot.active {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.35);
    }

    .step-dot.done {
      background: #059669;
      color: #fff;
    }

    .step-dot.pending {
      background: transparent;
      border: 2px solid #475569;
      color: #94a3b8;
    }

    .step-line {
      width: 40px;
      height: 2px;
      background: #475569;
    }

    .step-line.done {
      background: #059669;
    }

    /* ---------- card ---------- */
    .onboarding-card {
      width: 100%;
      max-width: 580px;
      background: linear-gradient(180deg, rgba(28, 58, 67, 0.97), rgba(15, 32, 39, 0.97));
      border: 1px solid rgba(122, 183, 214, 0.15);
      border-radius: 18px;
      padding: 40px 36px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
    }

    .onboarding-card h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .onboarding-card .subtitle {
      color: #94a3b8;
      font-size: 0.92rem;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* ---------- form ---------- */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .form-group label .optional {
      font-weight: 400;
      color: #94a3b8;
      font-size: 0.82rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(122, 183, 214, 0.2);
      background: rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #94a3b8;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-group .field-error {
      font-size: 0.82rem;
      color: #ef4444;
      margin-top: 4px;
      display: none;
    }

    .form-group.has-error input,
    .form-group.has-error textarea {
      border-color: #ef4444;
    }

    .form-group.has-error .field-error {
      display: block;
    }

    /* ---------- buttons ---------- */
    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .btn-primary {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-primary:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      padding: 14px 20px;
      border: 1px solid rgba(122, 183, 214, 0.2);
      border-radius: 12px;
      background: transparent;
      color: #94a3b8;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    /* ---------- feedback ---------- */
    #formFeedback {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    #formFeedback.success {
      display: block;
      background: rgba(5, 150, 105, 0.15);
      border: 1px solid rgba(5, 150, 105, 0.3);
      color: #6ee7b7;
    }

    #formFeedback.error {
      display: block;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    #formFeedback.loading {
      display: block;
      background: rgba(37, 99, 235, 0.1);
      border: 1px solid rgba(37, 99, 235, 0.2);
      color: #93c5fd;
    }

    /* ---------- responsive ---------- */
    @media (max-width: 480px) {
      .onboarding-card {
        padding: 28px 20px;
      }
      .form-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="step-bar" aria-label="Onboarding progress">
    <span class="step-dot active" aria-current="step">1</span>
    <span class="step-line" aria-hidden="true"></span>
    <span class="step-dot pending">2</span>
    <span class="step-line" aria-hidden="true"></span>
    <span class="step-dot pending">3</span>
    <span class="step-line" aria-hidden="true"></span>
    <span class="step-dot pending">4</span>
  </div>

  <div class="onboarding-card">
    <h1>Tell us about your business</h1>
    <p class="subtitle">
      This information appears on your public website. You can always
      change it later from the Dashboard.
    </p>

    <form id="companyProfileForm" novalidate>
      <div class="form-group" id="fg-companyName">
        <label for="companyName">Company Name</label>
        <input
          type="text"
          id="companyName"
          name="companyName"
          placeholder="e.g. Acme Construction"
          required
          maxlength="200"
          autocomplete="organization"
        />
        <div class="field-error" id="err-companyName"></div>
      </div>

      <div class="form-group" id="fg-tagline">
        <label for="tagline">Tagline <span class="optional">(optional)</span></label>
        <input
          type="text"
          id="tagline"
          name="tagline"
          placeholder="e.g. Building dreams since 1995"
          maxlength="300"
        />
        <div class="field-error" id="err-tagline"></div>
      </div>

      <div class="form-group" id="fg-description">
        <label for="description">Business Description <span class="optional">(optional)</span></label>
        <textarea
          id="description"
          name="description"
          placeholder="Tell visitors what your business does, what makes you unique, and why they should choose you."
          maxlength="5000"
        ></textarea>
        <div class="field-error" id="err-description"></div>
      </div>

      <div class="form-group" id="fg-contactEmail">
        <label for="contactEmail">Contact Email</label>
        <input
          type="email"
          id="contactEmail"
          name="contactEmail"
          placeholder="e.g. hello@acme.com"
          required
          maxlength="254"
          autocomplete="email"
        />
        <div class="field-error" id="err-contactEmail"></div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary" id="saveBtn">
          Save &amp; Continue
        </button>
      </div>
    </form>

    <div id="formFeedback" role="alert"></div>
  </div>

  <script src="/js/onboarding-bg.js" defer></script>
  <script src="/js/onboarding.js"></script>
</body>
</html>
